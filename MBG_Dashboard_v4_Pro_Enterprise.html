<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MBG Monitoring Dashboard v4 Pro — Enterprise Edition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "lucide-react": "https://esm.sh/lucide-react@0.292.0"
    }
  }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { scrollbar-width: thin; scrollbar-color: #334155 transparent; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
    
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: linear-gradient(135deg, #0f0f23 0%, #1a0f3c 25%, #0a2342 50%, #0f0f23 75%, #1a0f3c 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes glow { 0%, 100% { text-shadow: 0 0 10px rgba(16,185,129,0.3), 0 0 20px rgba(6,182,212,0.2); } 50% { text-shadow: 0 0 20px rgba(16,185,129,0.6), 0 0 30px rgba(6,182,212,0.4); } }
    @keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
    @keyframes floatUp { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
    @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); } 50% { box-shadow: 0 0 20px 5px rgba(16,185,129,0.3); } }
    @keyframes grid-flow { 0% { background-position: 0 0; } 100% { background-position: 40px 40px; } }

    .fade-in { animation: fadeInUp 0.3s ease-out both; }
    .slide-in { animation: slideIn 0.3s ease-out; }
    .glow-text { animation: glow 3s ease-in-out infinite; }
    .shimmer-bg { animation: shimmer 2s infinite; background-size: 1000px 100%; }
    .float-up { animation: floatUp 3s ease-in-out infinite; }
    .pulse-glow { animation: pulse-glow 2s infinite; }
    .grid-bg { animation: grid-flow 20s linear infinite; }

    /* Glassmorphism */
    .glass { 
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(148, 163, 184, 0.12);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 2px rgba(255, 255, 255, 0.05);
    }

    .glass-light {
      background: rgba(30, 41, 59, 0.5);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(15, 23, 42, 0.4);
    }

    .glass-hover { transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .glass-hover:hover { 
      background: rgba(20, 33, 53, 0.7);
      border-color: rgba(16, 185, 129, 0.3);
      box-shadow: 0 8px 32px rgba(16, 185, 129, 0.1), inset 0 1px 2px rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }

    .neon-border {
      border: 1px solid rgba(16, 185, 129, 0.2);
      box-shadow: inset 0 0 20px rgba(16, 185, 129, 0.05), 0 0 20px rgba(16, 185, 129, 0.1);
    }

    .neon-cyan {
      border: 1px solid rgba(6, 182, 212, 0.3);
      box-shadow: inset 0 0 20px rgba(6, 182, 212, 0.05), 0 0 20px rgba(6, 182, 212, 0.1);
    }

    .chart-container { position: relative; height: 300px; width: 100%; }
    .chart-holographic { filter: drop-shadow(0 0 20px rgba(16, 185, 129, 0.3)); }

    .data-cell {
      background: linear-gradient(135deg, rgba(6, 182, 212, 0.05) 0%, rgba(16, 185, 129, 0.05) 100%);
      border-left: 2px solid rgba(16, 185, 129, 0.3);
    }

    .metric-card {
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(6, 182, 212, 0.1) 100%);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 12px;
    }

    .header-gradient { background: linear-gradient(90deg, rgba(16, 185, 129, 0.1) 0%, rgba(6, 182, 212, 0.1) 100%); }

    .motion-sm { transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .motion-md { transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .motion-lg { transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }

    .tooltip-glass {
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(148, 163, 184, 0.2);
    }
  </style>
</head>
<body class="antialiased">
<div id="root"></div>

<script type="text/babel" data-type="module">
import React,{useState,useEffect,useMemo,useRef,useCallback,Fragment}from'react';
import{createRoot}from'react-dom/client';
import{
  Search,Bell,Moon,Sun,ChevronDown,ChevronLeft,Zap,BarChart2,Briefcase,
  LayoutDashboard,Users,FileText,Settings,Activity,Stethoscope,

  Sparkles,Wallet,HeartPulse,LineChart,Bug,BellRing,ShieldCheck,

  Maximize2,ExternalLink,Zap as Lightning,TrendingUpIcon,Users2,
  Briefcase as BriefcaseIcon,CheckSquare,BarChart3,PieChart
}from'lucide-react';

// ── Constants ──────────────────────────────────────────────────────────────
const GOOGLE_SHEETS_URL='https://docs.google.com/spreadsheets/d/1eih0c1uTMZEY4bH5V0r-qnQjD2Y48M66L4QBWRi8Hxs/edit?usp=sharing';
const DB_KEY='mbg_pro_v4';
const getCurrentMonth=()=>{const now=new Date();const months=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];return{bulan:months[now.getMonth()],tahun:now.getFullYear()};};

const initData=()=>({

  revenue:[
    {bulan:'Feb',tahun:2026,realisasi:378529475,target:500000000,partial:false},
    {bulan:'Mar',tahun:2026,realisasi:443414263,target:500000000,partial:false},
    {bulan:'Apr',tahun:2026,realisasi:396087850,target:500000000,partial:false},
    {bulan:'Mei',tahun:2026,realisasi:339131200,target:500000000,partial:false},
    {bulan:'Jun',tahun:2026,realisasi:265325550,target:500000000,partial:true},
    {bulan:'Jul',tahun:2026,realisasi:180000000,target:500000000,partial:true},
  ],
  doctors:[
    {id:1,name:'dr. Amelia Putri',target:62000000,revenue:68500000,consult:142,treatment:98,product:18500000,status:'aktif',joinDate:'2021-03-01'},
    {id:2,name:'dr. Bagas Saputra',target:58000000,revenue:55200000,consult:128,treatment:84,product:14200000,status:'aktif',joinDate:'2022-01-15'},
    {id:3,name:'dr. Citra Maharani',target:60000000,revenue:41800000,consult:110,treatment:61,product:9800000,status:'aktif',joinDate:'2021-06-20'},
    {id:4,name:'dr. Devi Anggraini',target:55000000,revenue:59600000,consult:131,treatment:90,product:16100000,status:'aktif',joinDate:'2020-11-10'},
    {id:5,name:'dr. Eka Pratama',target:57000000,revenue:38900000,consult:102,treatment:58,product:8400000,status:'aktif',joinDate:'2022-05-01'},
    {id:6,name:'dr. Farah Salsabila',target:60000000,revenue:71200000,consult:150,treatment:104,product:19800000,status:'aktif',joinDate:'2021-02-14'},
  ],
  doctorTargets:[
    {id:1,doctorId:1,bulan:'Jul',tahun:2026,targetConsult:35,targetTreatment:25,targetProduct:5000000},
    {id:2,doctorId:2,bulan:'Jul',tahun:2026,targetConsult:32,targetTreatment:21,targetProduct:4500000},
  ],
  employees:[
    {id:1,name:'Fitria Nor Istiqomah',role:'Branch Manager',dept:'Management',status:'Aktif',kpi:94,target:100,joinDate:'2021-03-01'},
    {id:2,name:'Rara Anindya',role:'Frontliner',dept:'Customer Service',status:'Aktif',kpi:88,target:90,joinDate:'2025-11-15'},
    {id:3,name:'Budi Santoso',role:'Admin Online',dept:'Marketing',status:'Aktif',kpi:82,target:85,joinDate:'2022-07-10'},
    {id:4,name:'Sari Dewi',role:'Finance',dept:'Finance',status:'Aktif',kpi:90,target:95,joinDate:'2023-01-20'},
    {id:5,name:'Ahmad Fauzi',role:'Inventory Staff',dept:'Inventory',status:'Aktif',kpi:78,target:80,joinDate:'2022-10-05'},
  ],
  employeeTargets:[
    {id:1,empId:1,bulan:'Jul',tahun:2026,target:100,activity:'Management Tasks'},
    {id:2,empId:2,bulan:'Jul',tahun:2026,target:90,activity:'Customer Calls'},
  ],
  inventory:[
    {id:1,kode:'PRD-001',nama:'Brightening Serum 15ml',kategori:'Produk',stok:4,min_stok:10,harga:250000,satuan:'pcs'},
    {id:2,kode:'PRD-002',nama:'Sunscreen SPF50 30ml',kategori:'Produk',stok:22,min_stok:15,harga:185000,satuan:'pcs'},
    {id:3,kode:'MED-001',nama:'Tretinoin 0.05% Cream',kategori:'Obat',stok:8,min_stok:5,harga:95000,satuan:'tube'},
    {id:4,kode:'MED-002',nama:'Hidroquinon 2% Cream',kategori:'Obat',stok:3,min_stok:5,harga:85000,satuan:'tube'},
    {id:5,kode:'PRD-003',nama:'Moisturizer Niacinamide',kategori:'Produk',stok:15,min_stok:10,harga:165000,satuan:'pcs'},
  ],
  treatments:[
    {id:1,nama:'PRO YELLOW LASER COMPLETE',kategori:'Laser',total:189839888,qty:148,target_tahun:200},
    {id:2,nama:'PICOFRONT LASER COMPLETE',kategori:'Laser',total:155812500,qty:119,target_tahun:180},
    {id:3,nama:'KOREAN TONING FACIAL',kategori:'Facial',total:120790000,qty:210,target_tahun:250},
    {id:4,nama:"BENING'S NC BRIGHT",kategori:'Facial',total:120525000,qty:201,target_tahun:220},
    {id:5,nama:'CHROMOSOME FACIAL BRIGHTENING',kategori:'Facial',total:80477250,qty:142,target_tahun:160},
  ],
  notifications:[
    {id:1,type:'warning',title:'Stok menipis',msg:'Brightening Serum — sisa 4 unit',time:'2 jam lalu',read:false},
    {id:2,type:'success',title:'Data synced',msg:'Revenue & Dokter updated',time:'1 jam lalu',read:false},
    {id:3,type:'info',title:'Maintenance scheduled',msg:'Laser Pico — 5 Juli 2026',time:'3 hari lalu',read:true},
  ]
});

// ── Hooks ──────────────────────────────────────────────────────────────────
const getCached=()=>{try{return JSON.parse(localStorage.getItem(DB_KEY))||initData();}catch{return initData();}};
const setCached=d=>{try{localStorage.setItem(DB_KEY,JSON.stringify(d));}catch(e){console.warn(e);}};

const useDB=()=>{
  const[db,setDbState]=useState(getCached());
  const setDB=useCallback(u=>{const d=typeof u==='function'?u(db):{...db,...u};d.meta.lastUpdate=new Date().toISOString();setCached(d);setDbState(d);},[db]);
  return{db,setDB};
};

const useToast=()=>{
  const[toasts,set]=useState([]);
  const add=useCallback((msg,type='info',dur=4000)=>{const id=Date.now();set(p=>[...p,{id,msg,type}]);if(dur>0)setTimeout(()=>set(p=>p.filter(t=>t.id!==id)),dur);return id;},[]);
  return{toasts,add,remove:useCallback(id=>set(p=>p.filter(t=>t.id!==id)),[])};
};

const useAnimNum=(end,dur=1200)=>{const[v,set]=useState(0);useEffect(()=>{let ts=null;const step=t=>{if(!ts)ts=t;const p=Math.min((t-ts)/dur,1);const e=1-Math.pow(1-p,3);set(Math.floor(e*end));if(p<1)requestAnimationFrame(step);};requestAnimationFrame(step);},[end,dur]);return v;};

// ── Formatters ──────────────────────────────────────────────────────────────
const fmt={
  rp:n=>'Rp '+Math.round(n).toLocaleString('id-ID'),
  rpS:n=>{if(Math.abs(n)>=1e9)return'Rp '+(n/1e9).toFixed(2)+' M';if(Math.abs(n)>=1e6)return'Rp '+(n/1e6).toFixed(0)+' Jt';return fmt.rp(n);},
  achColor:p=>(p>=90?'emerald':p>=70?'amber':'rose'),
  achLabel:p=>(p>=90?'Hijau':p>=70?'Kuning':'Merah'),
  date:s=>{try{return new Date(s).toLocaleString('id-ID',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});}catch{return s;}},
  pct:(v,t)=>t>0?((v/t)*100).toFixed(1):'0.0',
};

// ── UI Components ──────────────────────────────────────────────────────────
const Toast=({toasts,remove})=>(
  <div className="fixed bottom-6 right-6 z-[999] flex flex-col gap-2 pointer-events-none">
    {toasts.map(t=>(
      <div key={t.id} className={`glass px-4 py-3 rounded-xl text-sm font-medium pointer-events-auto fade-in flex items-center gap-2 ${t.type==='success'?'border-emerald-500/50':'t.type==='error'?'border-rose-500/50':'border-blue-500/50'}`}>
        {t.type==='success'?<CheckCircle size={16} className="text-emerald-400"/>:t.type==='error'?<XCircle size={16} className="text-rose-400"/>:<Info size={16} className="text-blue-400"/>}
        <span className="text-slate-200">{t.msg}</span>
        <button onClick={()=>remove(t.id)} className="ml-auto opacity-50 hover:opacity-100 motion-sm"><X size={14}/></button>
      </div>
    ))}
  </div>
);

const Card=({children,className='',glow=false})=>(
  <div className={`glass glass-hover ${glow?'neon-border':''} rounded-2xl p-5 motion-md fade-in ${className}`}>
    {children}
  </div>
);

const Btn=({icon:Icon,label,onClick,variant='solid',color='emerald',size='sm',loading=false,disabled=false,className=''})=>{
  const sizes={sm:'px-3 py-1.5 text-xs',md:'px-4 py-2 text-sm',lg:'px-5 py-2.5 text-sm'};
  const colors={emerald:'bg-emerald-600/80 hover:bg-emerald-500 border-emerald-500/50 text-emerald-100',cyan:'bg-cyan-600/80 hover:bg-cyan-500 border-cyan-500/50 text-cyan-100',rose:'bg-rose-600/80 hover:bg-rose-500 border-rose-500/50 text-rose-100',blue:'bg-blue-600/80 hover:bg-blue-500 border-blue-500/50 text-blue-100'};
  const styles={solid:`border ${colors[color]}`,outline:`border border-${color}-500/50 text-${color}-400 hover:bg-${color}-500/10`,ghost:`text-${color}-400 hover:bg-${color}-500/5`};
  return(
    <button onClick={onClick} disabled={disabled||loading} className={`flex items-center gap-1.5 rounded-lg font-semibold motion-sm transition-all ${sizes[size]} ${styles[variant]} disabled:opacity-40 disabled:cursor-not-allowed ${className}`}>
      {loading?<RefreshCw size={12} className="animate-spin"/>:Icon&&<Icon size={12}/>}{label}
    </button>
  );
};

const Badge=({label,color='emerald'})=><span className={`text-[10px] font-bold px-2 py-0.5 rounded-full bg-${color}-500/20 text-${color}-300 border border-${color}-500/30`}>{label}</span>;

const Input=({label,value,onChange,type='text',placeholder=''})=>(
  <div className="mb-3">
    {label&&<label className="block text-xs font-bold text-slate-400 mb-1 uppercase tracking-wider">{label}</label>}
    <input type={type} value={value} onChange={onChange} placeholder={placeholder} className="w-full glass text-slate-100 placeholder-slate-500 rounded-lg px-3 py-2 text-sm border-slate-600/50 focus:border-emerald-500/50 outline-none motion-sm"/>
  </div>
);

const Modal=({open,onClose,title,children,width='max-w-lg'})=>!open?null:(
  <div className="fixed inset-0 z-[500] flex items-center justify-center p-4">
    <div className="absolute inset-0 bg-black/70 backdrop-blur-md" onClick={onClose}/>
    <div className={`relative z-10 w-full ${width} glass rounded-2xl fade-in max-h-[90vh] overflow-y-auto`}>
      <div className="flex items-center justify-between px-5 py-4 border-b border-slate-600/50 sticky top-0">
        <h3 className="font-bold text-slate-100">{title}</h3>
        <button onClick={onClose} className="text-slate-500 hover:text-slate-300 motion-sm"><X size={18}/></button>
      </div>
      <div className="p-5">{children}</div>
    </div>
  </div>
);

const SectionHeader=({icon:Icon,title,action})=>(
  <div className="flex items-center justify-between mb-5">
    <div className="flex items-center gap-3">
      <div className="p-2.5 rounded-lg bg-emerald-500/20 border border-emerald-500/40 text-emerald-400">
        <Icon size={18}/>
      </div>
      <h3 className="text-lg font-bold text-slate-100 tracking-wide">{title}</h3>
    </div>
    {action}
  </div>
);

const KpiCard=({title,value,sub,trend,icon:Icon,color='emerald'})=>{
  const anim=useAnimNum(typeof value==='number'?value:0,1200);
  const display=typeof value==='number'&&value>1000?fmt.rpS(anim*1000):anim;
  return(
    <Card className="border-l-2 border-l-emerald-500/50">
      <div className="flex justify-between items-start mb-3">
        <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">{title}</span>
        <div className={`p-2 rounded-lg bg-${color}-500/20 border border-${color}-500/40 text-${color}-400`}><Icon size={14}/></div>
      </div>
      <div className="text-2xl font-bold text-slate-100 glow-text mb-1">{display}</div>
      <div className="text-xs text-slate-400 mb-3">{sub}</div>
      <div className="flex items-center gap-1 text-xs font-semibold text-emerald-400">
        <ArrowUp size={11}/>{trend}
      </div>
    </Card>
  );
};

const ProgressBar=({pct,color='emerald'})=>(
  <div className="w-full h-2 rounded-full overflow-hidden bg-slate-700/50 border border-slate-600/50 mb-2">
    <div className={`h-full rounded-full bg-gradient-to-r from-${color}-500 to-${color}-400 transition-all duration-700`} style={{width:`${Math.min(pct,100)}%`}}/>
  </div>
);

// ── Pages ──────────────────────────────────────────────────────────────────

// Page: Executive Dashboard
function PageDashboard({db,addToast}){
  const rev=db.revenue;
  const curr=rev.find(r=>r.bulan===db.meta.currentMonth.bulan&&r.tahun===db.meta.currentMonth.tahun)||rev[rev.length-1];
  const achv=fmt.pct(curr.realisasi,curr.target);
  const total=rev.reduce((s,r)=>s+r.realisasi,0);
  const docs=[...db.doctors].sort((a,b)=>b.revenue-a.revenue);
  const chartRef=useRef(null);

  useEffect(()=>{
    if(!chartRef.current)return;
    const ctx=chartRef.current.getContext('2d');
    new Chart(ctx,{
      type:'line',
      data:{
        labels:rev.map(d=>`${d.bulan} '${String(d.tahun).slice(2)}`),
        datasets:[
          {label:'Realisasi',data:rev.map(d=>d.realisasi),borderColor:'#10b981',backgroundColor:'rgba(16,185,129,0.1)',fill:true,tension:0.4,pointRadius:4,pointBackgroundColor:'#10b981',pointBorderColor:'#0f172a'},
          {label:'Target',data:rev.map(d=>d.target),borderColor:'#06b6d4',borderDash:[5,5],backgroundColor:'rgba(6,182,212,0.05)',tension:0.4,pointRadius:3,pointBackgroundColor:'#06b6d4'}
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#cbd5e1',font:{size:11,family:"'Inter'"}}},tooltip:{backgroundColor:'rgba(15,23,42,0.9)',titleColor:'#ecf0f1',bodyColor:'#cbd5e1',borderColor:'rgba(16,185,129,0.3)',borderWidth:1}},scales:{y:{beginAtZero:true,ticks:{color:'#94a3b8'},grid:{color:'rgba(15,23,42,0.3)'}},x:{ticks:{color:'#94a3b8'}}}}
    });
  },[rev]);

  return(
    <div className="space-y-5 fade-in">
      <Card className="header-gradient border-emerald-500/30">
        <div className="flex gap-3">
          <div className="w-12 h-12 rounded-lg bg-gradient-to-br from-emerald-500 to-cyan-500 flex items-center justify-center flex-shrink-0">
            <Lightbulb size={20} className="text-white"/>
          </div>
          <div className="flex-1">
            <p className="text-sm font-bold text-slate-100 mb-1">💡 AI Insight — {curr.bulan} {curr.tahun}</p>
            <p className="text-xs text-slate-300 leading-relaxed">
              {achv>=90?`🎯 Excellent! Achievement ${achv}% — Target tercapai. Realisasi ${fmt.rpS(curr.realisasi)} dari target ${fmt.rpS(curr.target)}.`
              :achv>=70?`📊 Achievement ${achv}% — Akselerasi diperlukan. Masih perlu ${fmt.rpS(curr.target-curr.realisasi)}.`
              :`⚠️ Warning! Achievement hanya ${achv}% — Urgent action needed. Gap ${fmt.rpS(curr.target-curr.realisasi)}.`}
            </p>
          </div>
        </div>
      </Card>

      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <KpiCard title="Revenue MTD" value={curr.realisasi} sub={`${curr.bulan} ${curr.tahun}`} trend={`${achv}% target`} icon={Wallet} color="emerald"/>
        <KpiCard title="Achievement" value={achv} sub="vs target" trend={achv>=70?'On Track':'At Risk'} icon={Target} color={fmt.achColor(Number(achv))}/>
        <KpiCard title="YTD Total" value={total} sub="Akumulasi 2026" trend="Jan-Jul" icon={TrendingUp} color="cyan"/>
        <KpiCard title="Top Doctor" value={docs[0].revenue} sub={docs[0].name} trend={`${fmt.pct(docs[0].revenue,docs[0].target)}%`} icon={Stethoscope} color="purple"/>
      </div>

      <Card glow className="chart-holographic">
        <SectionHeader icon={LineChart} title="Revenue Trend & Target" action={<Badge label="Holographic" color="cyan"/>}/>
        <div className="chart-container">
          <canvas ref={chartRef}/>

// Page: Doctor Target Management
function PageDoctorTargetMgmt({db,setDB,addToast}){
  const[editModal,setEditModal]=useState(false);
  const[editItem,setEditItem]=useState(null);
  const[form,setForm]=useState({});

  const handleEdit=item=>{setEditItem(item);setForm({...item});setEditModal(true);};
  const handleSave=()=>{
    if(!form.targetConsult||!form.targetTreatment||!form.targetProduct){addToast('Semua field harus diisi','error');return;}
    if(editItem){
      setDB(p=>({...p,doctorTargets:p.doctorTargets.map(t=>t.id===editItem.id?{...t,...form}:t)}));
    }else{
      setDB(p=>({...p,doctorTargets:[...p.doctorTargets,{id:Date.now(),...form}]}));
    }
    addToast(editItem?'Target diupdate':'Target ditambah','success');
    setEditModal(false);
  };

  return(
    <div className="space-y-5 fade-in">
      <Card className="header-gradient border-teal-500/30">
        <SectionHeader icon={Target} title="Doctor Target Management" action={<Btn icon={Plus} label="Add Target" onClick={()=>{setEditItem(null);setForm({doctorId:'',bulan:db.meta.currentMonth.bulan,tahun:db.meta.currentMonth.tahun,targetConsult:0,targetTreatment:0,targetProduct:0});setEditModal(true);}} size="sm" color="emerald"/>}/>
      </Card>

      <Card glow>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="border-b border-slate-600/50">
              <tr className="text-xs font-bold text-slate-300 uppercase tracking-widest">
                <th className="text-left pb-3 px-3">Doctor</th>
                <th className="text-right pb-3 px-3">Consult Target</th>
                <th className="text-right pb-3 px-3">Treatment Target</th>
                <th className="text-right pb-3 px-3">Product Target</th>
                <th className="text-center pb-3 px-3">Actions</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-slate-700/50">
              {db.doctorTargets.map(t=>{const doc=db.doctors.find(d=>d.id===t.doctorId);return(
                <tr key={t.id} className="text-slate-300 hover:bg-slate-800/30 motion-sm">
                  <td className="px-3 py-3">{doc?.name}</td>
                  <td className="text-right px-3 py-3">{t.targetConsult}</td>
                  <td className="text-right px-3 py-3">{t.targetTreatment}</td>
                  <td className="text-right px-3 py-3">{fmt.rpS(t.targetProduct)}</td>
                  <td className="text-center px-3 py-3 flex justify-center gap-1">
                    <Btn icon={Edit2} onClick={()=>handleEdit(t)} variant="ghost" size="sm" color="cyan"/>
                    <Btn icon={Trash2} onClick={()=>{setDB(p=>({...p,doctorTargets:p.doctorTargets.filter(x=>x.id!==t.id)}));addToast('Target deleted','success');}} variant="ghost" size="sm" color="rose"/>
                  </td>
                </tr>
              );})}
            </tbody>
          </table>
        </div>
      </Card>

      <Modal open={editModal} onClose={()=>setEditModal(false)} title={editItem?'Edit Doctor Target':'Add Doctor Target'}>
        <div className="space-y-3">
          <select value={form.doctorId} onChange={e=>setForm(p=>({...p,doctorId:Number(e.target.value)}))} className="glass w-full rounded-lg px-3 py-2 text-sm text-slate-200 border-slate-600/50">
            <option value="">Select Doctor</option>
            {db.doctors.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}
          </select>
          <Input label="Target Konsultasi" value={form.targetConsult} onChange={e=>setForm(p=>({...p,targetConsult:Number(e.target.value)}))} type="number"/>
          <Input label="Target Treatment" value={form.targetTreatment} onChange={e=>setForm(p=>({...p,targetTreatment:Number(e.target.value)}))} type="number"/>
          <Input label="Target Product (Rp)" value={form.targetProduct} onChange={e=>setForm(p=>({...p,targetProduct:Number(e.target.value)}))} type="number"/>
          <div className="flex gap-2 pt-3">
            <Btn label="Save" onClick={handleSave} color="emerald"/>
            <Btn label="Cancel" onClick={()=>setEditModal(false)} variant="outline" color="rose"/>
          </div>
        </div>
      </Modal>
    </div>
  );
}

const MENU=[
  {group:'DASHBOARD',items:[
    {name:'Executive Dashboard',icon:LayoutDashboard,page:'dashboard'},
    {name:'Doctor Dashboard',icon:Stethoscope,page:'doctor'},
    {name:'Employee Dashboard',icon:Users,page:'employee'},
  ]},
  {group:'TARGET MANAGEMENT',items:[
    {name:'Doctor Targets',icon:Target,page:'doctorTargets'},
    {name:'Employee Targets',icon:Target,page:'employeeTargets'},
  ]},
  {group:'DATA',items:[
    {name:'Upload & Database',icon:Database,page:'upload'},
  ]},
];

// ── APP ────────────────────────────────────────────────────────────────────
function App(){
  const[page,setPage]=useState('dashboard');
  const[dark,setDark]=useState(true);
  const{db,setDB}=useDB();
  const{toasts,add:addToast,remove:removeToast}=useToast();
  const unread=db.notifications.filter(n=>!n.read).length;

  const renderPage=()=>{
    switch(page){
      case'dashboard':return<PageDashboard db={db} addToast={addToast}/>;
      case'doctor':return<PageDoctorDashboard db={db} addToast={addToast}/>;
      case'employee':return<PageEmployeeDashboard db={db} addToast={addToast}/>;
      case'doctorTargets':return<PageDoctorTargetMgmt db={db} setDB={setDB} addToast={addToast}/>;
      case'employeeTargets':return<PageEmployeeTargetMgmt db={db} setDB={setDB} addToast={addToast}/>;
      case'upload':return<PageUploadData db={db} setDB={setDB} addToast={addToast}/>;
      default:return<PageDashboard db={db} addToast={addToast}/>;
    }
  };

  const currentPage=MENU.flatMap(g=>g.items).find(i=>i.page===page)?.name||'Dashboard';

  return(
    <div className="flex h-screen overflow-hidden">
      {/* Sidebar */}
      <aside className="glass w-72 h-full flex flex-col border-r border-slate-700/50 z-20">
        <div className="h-16 flex items-center gap-3 px-5 border-b border-slate-700/50 shrink-0">
          <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-emerald-500 to-cyan-500 flex items-center justify-center flex-shrink-0 shadow-lg shadow-emerald-500/30">
            <span className="font-bold text-white text-sm">MBG</span>
          </div>
          <div>
            <div className="font-bold text-slate-100 text-sm">MBG Dashboard</div>
            <div className="text-[10px] text-slate-400">Enterprise v4</div>
          </div>
        </div>

        <nav className="flex-1 overflow-y-auto px-3 py-4 space-y-6">
          {MENU.map((group,gi)=>(
            <div key={gi}>
              <h3 className="text-xs font-bold text-slate-500 uppercase tracking-widest px-3 mb-2">{group.group}</h3>
              <div className="space-y-1">
                {group.items.map((item,ii)=>{const Icon=item.icon;return(
                  <button key={ii} onClick={()=>setPage(item.page)} className={`w-full flex items-center gap-3 px-3 py-2 rounded-lg motion-sm transition-all ${page===item.page?'glass neon-border bg-emerald-500/10':'hover:bg-slate-800/50'}`}>
                    <Icon size={18} className={page===item.page?'text-emerald-400':'text-slate-400'}/>
                    <span className={`text-sm font-medium ${page===item.page?'text-emerald-300':'text-slate-300'}`}>{item.name}</span>
                  </button>
                );})}
              </div>
            </div>
          ))}
        </nav>

        <div className="border-t border-slate-700/50 p-4 shrink-0">
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-2">
              <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-purple-500 to-cyan-500 flex items-center justify-center text-white text-xs font-bold">A</div>
              <div>
                <div className="text-xs font-bold text-slate-200">Admin</div>
                <div className="text-[10px] text-slate-400">Gresik</div>
              </div>
            </div>
            <button onClick={()=>setDark(!dark)} className="text-slate-400 hover:text-slate-200 motion-sm">
              {dark?<Sun size={16}/>:<Moon size={16}/>}
            </button>
          </div>
        </div>
      </aside>

      {/* Main Content */}
      <main className="flex-1 flex flex-col overflow-hidden">
        <header className="glass h-14 border-b border-slate-700/50 px-6 flex items-center justify-between shrink-0">
          <div className="flex items-center gap-3">
            <h2 className="text-sm font-bold text-slate-100">{currentPage}</h2>
            <span className="text-xs text-slate-500">•</span>
            <span className="text-xs text-slate-400">{db.meta.currentMonth.bulan} {db.meta.currentMonth.tahun}</span>
          </div>
          <div className="flex items-center gap-3">
            <button className="relative text-slate-400 hover:text-slate-200 motion-sm">
              <Bell size={18}/>
              {unread>0&&<span className="absolute -top-1 -right-1 w-4 h-4 bg-rose-500 text-[8px] text-white rounded-full flex items-center justify-center font-bold">{unread}</span>}
            </button>
          </div>
        </header>

        <div className="flex-1 overflow-y-auto p-6">
          {renderPage()}
        </div>
      </main>

      <Toast toasts={toasts} remove={removeToast}/>
    </div>
  );
}

createRoot(document.getElementById('root')).render(<App/>);
</script>
