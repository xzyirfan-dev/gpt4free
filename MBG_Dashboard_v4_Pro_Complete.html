  <style>
    * { scrollbar-width: thin; scrollbar-color: #334155 transparent; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: linear-gradient(135deg, #0f0f23 0%, #1a0f3c 25%, #0a2342 50%, #0f0f23 75%, #1a0f3c 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes glow { 0%, 100% { text-shadow: 0 0 10px rgba(16,185,129,0.3), 0 0 20px rgba(6,182,212,0.2); } 50% { text-shadow: 0 0 20px rgba(16,185,129,0.6), 0 0 30px rgba(6,182,212,0.4); } }
    @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); } 50% { box-shadow: 0 0 20px 5px rgba(16,185,129,0.3); } }
    .fade-in { animation: fadeInUp 0.3s ease-out both; }
    .glow-text { animation: glow 3s ease-in-out infinite; }
    .pulse-glow { animation: pulse-glow 2s infinite; }
    .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(148, 163, 184, 0.12); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); }
    .glass-hover { transition: all 0.3s ease; }
    .glass-hover:hover { background: rgba(20, 33, 53, 0.7); border-color: rgba(16, 185, 129, 0.3); transform: translateY(-2px); }
    .neon-border { border: 1px solid rgba(16, 185, 129, 0.2); box-shadow: inset 0 0 20px rgba(16, 185, 129, 0.05); }
    .chart-container { position: relative; height: 300px; width: 100%; }
    .data-cell { background: linear-gradient(135deg, rgba(6, 182, 212, 0.05) 0%, rgba(16, 185, 129, 0.05) 100%); border-left: 2px solid rgba(16, 185, 129, 0.3); }
    .header-gradient { background: linear-gradient(90deg, rgba(16, 185, 129, 0.1) 0%, rgba(6, 182, 212, 0.1) 100%); }
  </style>
</head>
<body class="antialiased">
<div id="root"></div>

<script>

const e = React.createElement;
const f = React.Fragment;

  return { bulan: months[now.getMonth()], tahun: now.getFullYear() };
};

  ],
  employees: [
    {id:1,name:'Fitria Nor Istiqomah',role:'Branch Manager',dept:'Management',status:'Aktif',kpi:94,target:100},
    {id:2,name:'Rara Anindya',role:'Frontliner',dept:'Customer Service',status:'Aktif',kpi:88,target:90},
    {id:3,name:'Budi Santoso',role:'Admin Online',dept:'Marketing',status:'Aktif',kpi:82,target:85},
    {id:4,name:'Sari Dewi',role:'Finance',dept:'Finance',status:'Aktif',kpi:90,target:95},
    {id:5,name:'Ahmad Fauzi',role:'Inventory Staff',dept:'Inventory',status:'Aktif',kpi:78,target:80},
  ],
  doctorTargets: [
    {id:1,doctorId:1,bulan:'Jul',tahun:2026,targetConsult:35,targetTreatment:25,targetProduct:5000000},
    {id:2,doctorId:2,bulan:'Jul',tahun:2026,targetConsult:32,targetTreatment:21,targetProduct:4500000},

    {id:4,doctorId:4,bulan:'Jul',tahun:2026,targetConsult:33,targetTreatment:23,targetProduct:4200000},
    {id:5,doctorId:5,bulan:'Jul',tahun:2026,targetConsult:28,targetTreatment:18,targetProduct:3800000},
    {id:6,doctorId:6,bulan:'Jul',tahun:2026,targetConsult:37,targetTreatment:26,targetProduct:5200000},
  ],
  employeeTargets: [

    {id:2,empId:2,bulan:'Jul',tahun:2026,target:90,activity:'Customer Calls'},

  ],
  inventory: [
    {id:1,kode:'PRD-001',nama:'Brightening Serum 15ml',kategori:'Produk',stok:4,min_stok:10,harga:250000,satuan:'pcs'},
    {id:2,kode:'PRD-002',nama:'Sunscreen SPF50 30ml',kategori:'Produk',stok:22,min_stok:15,harga:185000,satuan:'pcs'},
    {id:3,kode:'MED-001',nama:'Tretinoin 0.05% Cream',kategori:'Obat',stok:8,min_stok:5,harga:95000,satuan:'tube'},

  ],

    {id:1,nama:'PRO YELLOW LASER COMPLETE',kategori:'Laser',total:189839888,qty:148,target_tahun:200},
    {id:2,nama:'PICOFRONT LASER COMPLETE',kategori:'Laser',total:155812500,qty:119,target_tahun:180},

  ],

    {id:1,type:'warning',title:'Stok menipis',msg:'Brightening Serum — 4 unit',time:'2 jam lalu',read:false},
    {id:2,type:'success',title:'Data synced',msg:'Revenue updated',time:'1 jam lalu',read:false},
  ]
});

const getCached = () => {
  try {
    const stored = localStorage.getItem(DB_KEY);
    return stored ? JSON.parse(stored) : initData();
  } catch {
    return initData();
  }
};

const setCached = (d) => {
  try {
    localStorage.setItem(DB_KEY, JSON.stringify(d));
  } catch (err) {
    console.warn('Storage error:', err);
  }
};

const useDB = () => {
  const [db, setDbState] = useState(getCached);
  const setDB = useCallback((updater) => {
    setDbState(prev => {
      const next = typeof updater === 'function' ? updater(prev) : {...prev, ...updater};
      next.meta.lastUpdate = new Date().toISOString();
      setCached(next);
      return next;
    });
  }, []);
  return { db, setDB };
};

const useToast = () => {
  const [toasts, set] = useState([]);
  const add = useCallback((msg, type = 'info') => {
    const id = Date.now();
    set(p => [...p, {id, msg, type}]);
    setTimeout(() => set(p => p.filter(t => t.id !== id)), 4000);
  }, []);
  const remove = useCallback(id => set(p => p.filter(t => t.id !== id)), []);
  return { toasts, add, remove };
};

const fmt = {
  rp: (n) => 'Rp ' + Math.round(n).toLocaleString('id-ID'),
  rpS: (n) => {
    if (Math.abs(n) >= 1e9) return 'Rp ' + (n/1e9).toFixed(2) + ' M';
    if (Math.abs(n) >= 1e6) return 'Rp ' + (n/1e6).toFixed(0) + ' Jt';
    return fmt.rp(n);
  },
  achColor: (p) => p >= 90 ? 'emerald' : p >= 70 ? 'amber' : 'rose',
  pct: (v, t) => t > 0 ? ((v/t)*100).toFixed(1) : '0.0',
};

// UI Components
const Toast = ({toasts, remove}) => e('div', {className: 'fixed bottom-6 right-6 z-[999] flex flex-col gap-2 pointer-events-none'},
  toasts.map(t => e('div', {key: t.id, className: `glass px-4 py-3 rounded-xl text-sm font-medium pointer-events-auto fade-in flex items-center gap-2`},
    e('span', {className: `font-bold text-xs ${t.type==='success'?'text-emerald-400':t.type==='error'?'text-rose-400':'text-blue-400'}`}, t.type==='success'?'✓':t.type==='error'?'✕':'ℹ'),
    t.msg,
    e('button', {onClick: () => remove(t.id), className: 'ml-auto opacity-50 hover:opacity-100'}, '×')
  ))
);

const Card = ({children, className = '', glow = false}) => e('div', {className: `glass glass-hover ${glow?'neon-border':''} rounded-2xl p-5 fade-in ${className}`}, children);

const KpiCard = ({title, value, sub, trend}) => e(Card, {className: 'border-l-2 border-l-emerald-500/50'},
  e('div', {className: 'flex justify-between items-start mb-3'},
    e('span', {className: 'text-xs font-bold text-slate-400'}, title)
  ),
  e('div', {className: 'text-2xl font-bold text-slate-100 glow-text mb-1'}, typeof value === 'number' && value > 1000 ? fmt.rpS(value) : value),
  e('div', {className: 'text-xs text-slate-400 mb-3'}, sub),
  e('div', {className: 'text-xs font-semibold text-emerald-400'}, '↑ ' + trend)
);

const SectionHeader = ({title, action}) => e('div', {className: 'flex items-center justify-between mb-5'},
  e('h3', {className: 'text-lg font-bold text-slate-100'}, title),
  action
);

// Pages
const PageDashboard = ({db, addToast}) => {
  const chartRef = useRef(null);
  const rev = db.revenue;
  const curr = rev.find(r => r.bulan === db.meta.currentMonth.bulan && r.tahun === db.meta.currentMonth.tahun) || rev[rev.length - 1];
  const achv = fmt.pct(curr.realisasi, curr.target);
  const total = rev.reduce((s, r) => s + r.realisasi, 0);
  const docs = [...db.doctors].sort((a, b) => b.revenue - a.revenue);

  useEffect(() => {
    if (!chartRef.current) return;
    const ctx = chartRef.current.getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: rev.map(d => `${d.bulan} '${String(d.tahun).slice(2)}`),
        datasets: [
          {label: 'Realisasi', data: rev.map(d => d.realisasi), borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.1)', fill: true, tension: 0.4},
          {label: 'Target', data: rev.map(d => d.target), borderColor: '#06b6d4', borderDash: [5,5], tension: 0.4}
        ]
      },
      options: {responsive: true, maintainAspectRatio: false, plugins: {legend: {labels: {color: '#cbd5e1'}}}, scales: {y: {ticks: {color: '#94a3b8'}, grid: {color: 'rgba(15,23,42,0.3)'}}, x: {ticks: {color: '#94a3b8'}}}}
    });
  }, [rev]);

  return e('div', {className: 'space-y-5 fade-in'},
    e(Card, {className: 'header-gradient border-emerald-500/30'},
      e('div', {className: 'flex gap-3'},
        e('div', {className: 'w-12 h-12 rounded-lg bg-gradient-to-br from-emerald-500 to-cyan-500 flex items-center justify-center text-white text-lg'}, '💡'),
        e('div', {className: 'flex-1'},
          e('p', {className: 'text-sm font-bold text-slate-100 mb-1'}, `AI Insight — ${curr.bulan} ${curr.tahun}`),
          e('p', {className: 'text-xs text-slate-300'}, achv >= 90 ? `✓ Excellent! Achievement ${achv}% - Target tercapai` : achv >= 70 ? `⚠ Achievement ${achv}% - Akselerasi diperlukan` : `✕ Warning! Achievement ${achv}% - Urgent action`)
        )
      )
    ),
    e('div', {className: 'grid grid-cols-2 lg:grid-cols-4 gap-4'},
      e(KpiCard, {title: 'Revenue MTD', value: curr.realisasi, sub: `${curr.bulan} ${curr.tahun}`, trend: `${achv}% target`}),
      e(KpiCard, {title: 'Achievement', value: Number(achv), sub: 'vs target', trend: achv >= 70 ? 'On Track' : 'At Risk'}),
      e(KpiCard, {title: 'YTD Total', value: total, sub: 'Akumulasi 2026', trend: 'Jan-Jul'}),
      e(KpiCard, {title: 'Top Doctor', value: docs[0].revenue, sub: docs[0].name, trend: fmt.pct(docs[0].revenue, docs[0].target) + '%'})
    ),
    e(Card, {glow: true},
      e(SectionHeader, {title: 'Revenue Trend & Target'}),
      e('div', {className: 'chart-container'},
        e('canvas', {ref: chartRef})
      )
    ),
    e('div', {className: 'grid grid-cols-1 md:grid-cols-3 gap-4'},
      docs.slice(0, 3).map((d, i) => {
        const a = fmt.pct(d.revenue, d.target);
        return e(Card, {key: i, className: 'border-t-2 border-t-amber-500/50'},
          e('div', {className: 'flex items-center gap-2 mb-3'},
            e('div', {className: `w-8 h-8 rounded-full flex items-center justify-center font-bold text-white ${i===0?'bg-yellow-500/80':i===1?'bg-slate-500/80':'bg-amber-700/80'}`}, `#${i+1}`),
            e('span', {className: 'font-semibold text-slate-200 truncate'}, d.name)
          ),
          e('p', {className: 'text-2xl font-bold text-emerald-400 mb-2'}, fmt.rpS(d.revenue)),
          e('div', {className: 'w-full h-2 rounded-full overflow-hidden bg-slate-700/50 mb-2'},
            e('div', {className: 'h-full bg-emerald-400', style: {width: Math.min(a, 100) + '%'}})
          ),
          e('p', {className: 'text-xs text-slate-400'}, `${a}% dari target`)
        );
      })
    )
  );
};

const PageDoctors = ({db, setDB, addToast}) => e('div', {className: 'space-y-5 fade-in'},

  e('div', {className: 'grid grid-cols-1 md:grid-cols-2 gap-4'},
    db.inventory.map(item => {
      const status = item.stok < item.min_stok ? 'warning' : 'ok';
      return e(Card, {key: item.id, className: `border-l-2 ${status === 'warning' ? 'border-l-rose-500/50' : 'border-l-emerald-500/50'}`},
        e('div', {className: 'flex justify-between items-start mb-3'},
          e('div', null,
            e('p', {className: 'font-bold text-slate-100'}, item.nama),
            e('p', {className: 'text-xs text-slate-400'}, item.kode)
          ),
          e('span', {className: `text-[10px] px-2 py-1 rounded-full ${status === 'warning' ? 'bg-rose-500/20 text-rose-400' : 'bg-emerald-500/20 text-emerald-400'}`}, status === 'warning' ? 'LOW STOCK' : 'OK')
        ),
        e('div', {className: 'space-y-1.5 text-xs text-slate-400 mb-3'},
          e('div', null, `Stok: ${item.stok} ${item.satuan} (Min: ${item.min_stok})`),
          e('div', null, `Harga: ${fmt.rp(item.harga)}`)
        ),
        e('div', {className: 'w-full h-2 rounded-full overflow-hidden bg-slate-700/50'},
          e('div', {className: `h-full ${status === 'warning' ? 'bg-rose-400' : 'bg-emerald-400'}`, style: {width: Math.min((item.stok / item.min_stok) * 100, 100) + '%'}})
        )
      );
    })
  )
);

const PageUploadData = ({db, addToast}) => e('div', {className: 'space-y-5 fade-in'},
  e(Card, {className: 'header-gradient border-green-500/30'},
    e(SectionHeader, {title: 'Data Management & Upload'})
  ),
  e(Card, {glow: true},
    e('h4', {className: 'font-bold text-slate-100 mb-4'}, 'Database Link'),
    e('button', {onClick: () => window.open('https://docs.google.com/spreadsheets/d/1eih0c1uTMZEY4bH5V0r-qnQjD2Y48M66L4QBWRi8Hxs/edit?usp=sharing', '_blank'), className: 'glass glass-hover rounded-lg p-4 w-full flex items-center gap-3 text-left'},
      e('span', {className: 'text-2xl'}, '📊'),
      e('div', null,
        e('p', {className: 'font-semibold text-slate-100'}, 'Open Google Sheets'),
        e('p', {className: 'text-xs text-slate-400'}, 'View & edit database directly')
      )
    )
  ),
  e(Card, null,
    e('h4', {className: 'font-bold text-slate-100 mb-3'}, 'Database Info'),
    e('div', {className: 'grid grid-cols-4 gap-3 text-xs'},
      e('div', {className: 'data-cell p-3 rounded-lg'},
        e('p', {className: 'text-slate-400'}, 'Revenue'),
        e('p', {className: 'font-bold text-emerald-400 text-lg'}, db.revenue.length)
      ),
      e('div', {className: 'data-cell p-3 rounded-lg'},
        e('p', {className: 'text-slate-400'}, 'Doctors'),
        e('p', {className: 'font-bold text-cyan-400 text-lg'}, db.doctors.length)
      ),
      e('div', {className: 'data-cell p-3 rounded-lg'},
        e('p', {className: 'text-slate-400'}, 'Employees'),
        e('p', {className: 'font-bold text-purple-400 text-lg'}, db.employees.length)
      ),
      e('div', {className: 'data-cell p-3 rounded-lg'},
        e('p', {className: 'text-slate-400'}, 'Inventory'),
        e('p', {className: 'font-bold text-yellow-400 text-lg'}, db.inventory.length)
      )
    )
  )
);

// SIDEBAR & APP
const MENU = [
  {group: 'DASHBOARD', items: [{name: '📊 Executive', page: 'dashboard'}, {name: '💼 Data Upload', page: 'upload'}]},
  {group: 'MEDICAL', items: [{name: '👨⚕️ Doctors', page: 'doctors'}, {name: '🎯 Doctor Targets', page: 'doctorTargets'}]},
  {group: 'OPERATIONS', items: [{name: '👥 Employees', page: 'employees'}, {name: '📋 Employee Targets', page: 'employeeTargets'}]},
  {group: 'INVENTORY', items: [{name: '📦 Stock', page: 'inventory'}]},
];

const App = () => {
  const [page, setPage] = useState('dashboard');
  const {db, setDB} = useDB();
  const {toasts, add: addToast, remove: removeToast} = useToast();

  const renderPage = () => {
    switch (page) {
      case 'dashboard': return e(PageDashboard, {db, addToast});
      case 'doctors': return e(PageDoctors, {db, setDB, addToast});
      case 'employees': return e(PageEmployees, {db, setDB, addToast});
      case 'doctorTargets': return e(PageDoctorTargets, {db, setDB, addToast});
      case 'employeeTargets': return e(PageEmployeeTargets, {db, setDB, addToast});
      case 'inventory': return e(PageInventory, {db, addToast});
      case 'upload': return e(PageUploadData, {db, addToast});
      default: return e(PageDashboard, {db, addToast});
    }
  };

  return e('div', {className: 'flex h-screen overflow-hidden'},
    // Sidebar
    e('aside', {className: 'glass w-72 h-full flex flex-col border-r border-slate-700/50 overflow-y-auto'},
      e('div', {className: 'h-16 flex items-center gap-3 px-5 border-b border-slate-700/50 flex-shrink-0'},
        e('div', {className: 'w-10 h-10 rounded-lg bg-gradient-to-br from-emerald-500 to-cyan-500 flex items-center justify-center text-white font-bold'}, 'MBG'),
        e('div', null,
          e('div', {className: 'font-bold text-slate-100 text-sm'}, 'MBG Pro'),
          e('div', {className: 'text-[10px] text-slate-400'}, 'v4 Enterprise')
        )
      ),
      e('nav', {className: 'flex-1 px-3 py-4 space-y-6'},
        MENU.map((group, i) => e('div', {key: i},
          e('h4', {className: 'text-[10px] font-bold text-slate-400 uppercase tracking-wider px-2 mb-2'}, group.group),
          e('div', {className: 'space-y-1'},
            group.items.map((item, j) => e('button', {
              key: j,
              onClick: () => setPage(item.page),
              className: `w-full text-left px-3 py-2 rounded-lg text-sm font-medium transition-all ${page === item.page ? 'glass neon-border text-emerald-300' : 'text-slate-300 hover:bg-slate-800/50'}`
            }, item.name))
          )
        ))
      )
    ),
    // Main
    e('main', {className: 'flex-1 flex flex-col overflow-hidden'},
      e('header', {className: 'glass h-14 border-b border-slate-700/50 px-6 flex items-center justify-between flex-shrink-0'},
        e('h2', {className: 'text-sm font-bold text-slate-100'}, MENU.flatMap(g => g.items).find(i => i.page === page)?.name || 'Dashboard'),
        e('span', {className: 'text-xs text-slate-400'}, `${db.meta.currentMonth.bulan} ${db.meta.currentMonth.tahun}`)
      ),
      e('div', {className: 'flex-1 overflow-y-auto p-6'}, renderPage())
    ),
    e(Toast, {toasts, remove: removeToast})
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
