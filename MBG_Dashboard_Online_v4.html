// ── Sheet Data Handler ──────────────────────────────────────────────────────
const fetchSheetData=async()=>{
  try{
    const sheetId='1eih0c1uTMZEY4bH5V0r-qnQjD2Y48M66L4QBWRi8Hxs';
    const sheets=['Revenue','Dokter','Karyawan','Inventory','Treatment','Target'];
    const data={};
    
    for(const sheet of sheets){
      const url=`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${sheet}`;
      try{
        const response=await fetch(url);
        const text=await response.text();
        const json=JSON.parse(text.match(/\{[\s\S]*\}/)[0]);
        data[sheet]=json.table.rows.map(row=>row.c.map(cell=>cell?.v||''));
      }catch(e){
        console.warn(`Failed to load ${sheet}:`,e);
        data[sheet]=[];
      }
    }
    return data;
  }catch(e){
    console.error('Sheet fetch error:',e);
    return{};
  }
};

const useOnlineDB=()=>{
  const[db,setDbState]=useState(()=>getCachedData()||initDefaultData());
  const[syncing,setSyncing]=useState(false);
  const setDB=useCallback(updater=>{
    setDbState(prev=>{
      const next=typeof updater==='function'?updater(prev):{...prev,...updater};
      next.meta={...next.meta,lastUpdate:new Date().toISOString()};
      setCachedData(next);
      return next;
    });
  },[]);
  const syncWithSheet=useCallback(async()=>{
    setSyncing(true);
    const sheetData=await fetchSheetData();
    if(Object.keys(sheetData).length>0){
      setDB(prev=>({...prev,meta:{...prev.meta,syncStatus:'synced',lastSync:new Date().toISOString()}}));
    }
    setSyncing(false);
  },[setDB]);
  return{db,setDB,syncing,syncWithSheet};
};

// ── Hooks ───────────────────────────────────────────────────────────────────
const useAnimatedNumber=(end,dur=1200,isFloat=false)=>{
  const[v,set]=useState(0);
  useEffect(()=>{let ts=null;const step=t=>{if(!ts)ts=t;const p=Math.min((t-ts)/dur,1);const e=1-Math.pow(1-p,3);set(isFloat?+(e*end).toFixed(1):Math.floor(e*end));if(p<1)requestAnimationFrame(step);};requestAnimationFrame(step);},[end,dur,isFloat]);
  return v;
};

const useToast=()=>{
  const[toasts,set]=useState([]);
  const add=useCallback((msg,type='info',duration=4000)=>{
    const id=Date.now();
    set(p=>[...p,{id,msg,type}]);
    if(duration>0)setTimeout(()=>set(p=>p.filter(t=>t.id!==id)),duration);
    return id;
  },[]);
  const remove=useCallback(id=>set(p=>p.filter(t=>t.id!==id)),[]);
  return{toasts,add,remove};
};

// ── Data Review Modal ───────────────────────────────────────────────────────
function DataReviewModal({open,onClose,data,onConfirm,dark,T,title}){
  const[editedData,setEditedData]=useState(data);
  const[errors,setErrors]=useState([]);

  useEffect(()=>{setEditedData(data);setErrors([]);},[data,open]);

  const validateData=()=>{
    const newErrors=[];
    if(!editedData||editedData.length===0){
      newErrors.push('Data kosong');
      return newErrors;
    }
    editedData.forEach((row,idx)=>{
      if(typeof row==='object'){
        Object.entries(row).forEach(([key,val])=>{
          if(!val&&key!=='note'){
            newErrors.push(`Baris ${idx+1}: ${key} kosong`);
          }
        });
      }
    });
    return newErrors;
  };

  const handleConfirm=()=>{
    const errs=validateData();
    if(errs.length>0){
      setErrors(errs);
      return;
    }
    onConfirm(editedData);
    onClose();
  };

  return(
    <Modal open={open} onClose={onClose} title={title||'Review Data Sebelum Submit'} dark={dark} T={T} width="max-w-3xl">
      {errors.length>0&&(
        <div className="mb-4 p-3 rounded-lg bg-rose-500/10 border border-rose-500/30">
          <p className="text-xs font-bold text-rose-400 mb-2">⚠ {errors.length} Error:</p>
          <div className="space-y-1">
            {errors.slice(0,5).map((e,i)=><p key={i} className="text-[11px] text-rose-300">{e}</p>)}
            {errors.length>5&&<p className="text-[11px] text-rose-300">... dan {errors.length-5} error lainnya</p>}
          </div>
        </div>
      )}
      <div className="overflow-x-auto mb-4 max-h-60 overflow-y-auto">
        <table className="w-full text-left text-xs">
          <thead><tr className={`border-b ${T.divider} ${T.textFaint} sticky top-0 ${T.tableTh}`}>
            {Array.isArray(editedData[0])?editedData[0].map((h,i)=><th key={i} className="pb-2 px-2">{h}</th>):Object.keys(editedData[0]||{}).map(k=><th key={k} className="pb-2 px-2">{k}</th>)}
          </tr></thead>
          <tbody>{editedData.slice(Array.isArray(editedData[0])?1:0).map((row,i)=>(
            <tr key={i} className={`border-b ${T.divider} ${T.rowHover}`}>
              {Array.isArray(row)?row.map((cell,j)=><td key={j} className={`py-2 px-2 ${T.text}`}>{String(cell).slice(0,50)}</td>):Object.values(row).map((val,j)=><td key={j} className={`py-2 px-2 ${T.text}`}>{String(val).slice(0,50)}</td>)}
            </tr>
          ))}</tbody>
        </table>
      </div>
      <div className="flex gap-2">
        <Btn icon={CheckCircle} onClick={handleConfirm} color="emerald" size="md">Konfirmasi & Submit</Btn>
        <Btn icon={X} onClick={onClose} variant="outline" color="rose" size="md">Batal</Btn>
      </div>
    </Modal>
  );
}

// ── 2. Upload Data Excel dengan Auto-Mapping ────────────────────────────────
function PageUploadExcelAdvanced({dark,T,db,setDB,addToast}){
  const[file,setFile]=useState(null);
  const[sheets,setSheets]=useState([]);
  const[loading,setLoading]=useState(false);
  const[step,setStep]=useState('idle');
  const[selected,setSelected]=useState(0);
  const[mappings,setMappings]=useState({});
  const[reviewOpen,setReviewOpen]=useState(false);
  const[reviewData,setReviewData]=useState([]);
  const dbSchema={
    'Revenue':['bulan','tahun','realisasi','target','partial'],
    'Dokter':['name','target','revenue','consult','treatment','product'],
    'Karyawan':['name','role','dept','status','kpi'],
    'Inventory':['kode','nama','kategori','stok','min_stok','harga'],
    'Treatment':['nama','kategori','total','qty','target_tahun'],
  };

  const parse=async f=>{
    setLoading(true);
    setFile(f.name);
    const XLSX=await (window.XLSX||loadXLSX());
    if(!XLSX){addToast('Gagal load SheetJS','error');setLoading(false);return;}
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        const result=wb.SheetNames.map(name=>{
          const ws=wb.Sheets[name];
          const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
          return{name,headers:data[0]||[],rows:data.slice(1)};
        });
        setSheets(result);
        autoMapColumns(result);
        setStep('mapping');
      }catch(err){addToast('Error: '+err.message,'error');}
      setLoading(false);
    };
    reader.readAsArrayBuffer(f);
  };

  const autoMapColumns=sheets=>{
    const newMappings={};
    sheets.forEach((sheet,idx)=>{
      const targetSchema=Object.entries(dbSchema).find(([key])=>key.toLowerCase()===sheet.name.toLowerCase())?.[1]||[];
      const mapped={};
      targetSchema.forEach(col=>{
        const foundIdx=sheet.headers.findIndex(h=>h.toLowerCase().includes(col.toLowerCase())||col.toLowerCase().includes(h.toLowerCase()));
        if(foundIdx>=0)mapped[col]=foundIdx;
      });
      newMappings[idx]=mapped;
    });
    setMappings(newMappings);
  };

  const handleReview=()=>{
    const sh=sheets[selected];
    const map=mappings[selected]||{};
    const transformed=sh.rows.map(row=>{
      const obj={};
      Object.entries(map).forEach(([col,idx])=>{
        obj[col]=row[idx]||'';
      });
      return obj;
    }).filter(row=>Object.values(row).some(v=>v!==''));
    setReviewData(transformed);
    setReviewOpen(true);
  };

  const handleConfirmData=data=>{
    const sh=sheets[selected];
    const targetKey=Object.keys(dbSchema).find(k=>k.toLowerCase()===sh.name.toLowerCase());
    if(!targetKey){addToast('Sheet name tidak match database schema','error');return;}
    
    setDB(prev=>{
      const updated={...prev};
      if(!updated[targetKey])updated[targetKey]=[];
      updated[targetKey]=[...updated[targetKey],...data];
      return updated;
    });
    addToast(`${data.length} baris ditambahkan ke ${targetKey}!`,'success');
    setReviewOpen(false);
  };

  return(
    <div className="fade-in space-y-5">
      <Card dark={dark} glow="bg-emerald-500/5">
        <SectionHeader icon={FileSpreadsheet} title="Upload Excel — Smart Mapping" color="emerald" T={T}/>
        <label className={`flex flex-col items-center gap-3 border-2 border-dashed rounded-xl py-10 cursor-pointer transition-all ${dark?'border-white/15 hover:border-emerald-500/40':'border-black/15 hover:border-emerald-500/50'}`}>
          <input type="file" accept=".xlsx,.xls" className="hidden" onChange={e=>e.target.files?.[0]&&parse(e.target.files[0])}/>
          {loading?<RefreshCw size={26} className="text-emerald-400 animate-spin"/>:<FileSpreadsheet size={26} className="text-emerald-400"/>}
          <span className={`text-sm font-semibold ${T.text}`}>{file||'Pilih file Excel (.xlsx)'}</span>
          <span className={`text-xs ${T.textFaint}`}>Support: Revenue, Dokter, Karyawan, Inventory, Treatment</span>
        </label>
      </Card>

      {step==='mapping'&&sheets.length>0&&(
        <Fragment>
          <Card dark={dark}>
            <SectionHeader icon={Database} title={`${sheets.length} Sheet Ditemukan`} T={T}/>
            <div className="flex gap-2 flex-wrap mb-4">
              {sheets.map((s,i)=>(
                <button key={i} onClick={()=>setSelected(i)} className={`px-3 py-1.5 rounded-lg text-xs font-semibold border transition-all ${selected===i?'bg-emerald-500/20 border-emerald-500/40 text-emerald-400':(dark?'border-white/10 text-slate-400 hover:bg-white/5':'border-black/10 text-slate-500 hover:bg-black/5')}`}>
                  {s.name} <span className={`ml-1 opacity-60`}>({s.rows.length})</span>
                </button>
              ))}
            </div>
            {sheets[selected]&&(
              <div>
                <p className={`text-xs font-bold ${T.textMuted} mb-3`}>Column Mapping untuk "{sheets[selected].name}":</p>
                <div className="grid grid-cols-2 md:grid-cols-3 gap-2 mb-4">
                  {Object.entries(dbSchema).find(([k])=>k.toLowerCase()===sheets[selected].name.toLowerCase())?.[1]?.map(col=>(
                    <div key={col} className={`p-2 rounded border ${dark?'bg-white/5 border-white/10':'bg-black/5 border-black/10'}`}>
                      <p className={`text-[10px] ${T.textFaint}`}>{col}</p>
                      <select value={mappings[selected]?.[col]??-1} onChange={e=>setMappings(p=>({...p,[selected]:{...p[selected],[col]:Number(e.target.value)}}))} className={`w-full text-[10px] rounded border mt-1 ${T.inputBg} ${T.text}`}>
                        <option value={-1}>— Tidak mapped —</option>
                        {sheets[selected].headers.map((h,i)=><option key={i} value={i}>{h}</option>)}
                      </select>
                    </div>
                  ))}
                </div>
                <div className="overflow-x-auto max-h-48 overflow-y-auto mb-4">
                  <table className="w-full text-left text-xs">
                    <thead><tr className={`border-b ${T.divider} ${T.textFaint} sticky top-0 ${T.tableTh}`}>
                      {sheets[selected].headers.slice(0,8).map((h,i)=><th key={i} className="pb-2 px-2">{h}</th>)}
                      {sheets[selected].headers.length>8&&<th className="pb-2 px-2">+{sheets[selected].headers.length-8}</th>}
                    </tr></thead>
                    <tbody>{sheets[selected].rows.slice(0,5).map((row,i)=>(
                      <tr key={i} className={`border-b ${T.divider}`}>
                        {row.slice(0,8).map((c,j)=><td key={j} className={`py-1.5 px-2 ${T.text}`}>{String(c).slice(0,30)}</td>)}
                      </tr>
                    ))}</tbody>
                  </table>
                </div>
                <div className="flex gap-2">
                  <Btn icon={Eye} onClick={handleReview} color="cyan" size="md">Preview & Review</Btn>
                  <Btn icon={RefreshCw} onClick={()=>{setStep('idle');setSheets([]);setFile(null);}} variant="outline" size="md">Upload Lain</Btn>
                </div>
              </div>
            )}
          </Card>
        </Fragment>
      )}

      <DataReviewModal open={reviewOpen} onClose={()=>setReviewOpen(false)} data={reviewData} onConfirm={handleConfirmData} dark={dark} T={T} title="Review Data Sebelum Import"/>
    </div>
  );
}

// ── 4. Error Recovery & Data Forward ────────────────────────────────────────
function PageErrorRecovery({dark,T,db,setDB,addToast}){
  const[showLog,setShowLog]=useState(false);
  const[errors,setErrors]=useState([
    {id:1,time:new Date(Date.now()-3600000).toISOString(),table:'Revenue',error:'Invalid format in row 5: realisasi must be number',severity:'error',status:'unresolved'},
    {id:2,time:new Date(Date.now()-1800000).toISOString(),table:'Dokter',error:'Duplicate entry detected for dr. Amelia Putri',severity:'warning',status:'auto-fixed'},
    {id:3,time:new Date(Date.now()-900000).toISOString(),table:'Inventory',error:'Missing column: min_stok in row 3',severity:'error',status:'unresolved'},
  ]);

  const forwardData=()=>{
    addToast('Data forwarded to backup storage & recovery queue','success');
    const backup={timestamp:new Date().toISOString(),data:db,status:'backed_up'};
    localStorage.setItem('mbg_backup_'+Date.now(),JSON.stringify(backup));
  };

  const resolveError=id=>{
    setErrors(p=>p.map(e=>e.id===id?{...e,status:'resolved'}:e));
    addToast('Error ditandai sebagai resolved','success');
  };

  const retrySync=async()=>{
    addToast('Syncing dengan Google Sheets...','info');
    await new Promise(resolve=>setTimeout(resolve,2000));
    addToast('Sync completed successfully!','success');
  };

  return(
    <div className="fade-in space-y-5">
      {/* Quick Actions */}
      <Card dark={dark} glow="bg-blue-500/5">
        <SectionHeader icon={ShieldCheck} title="Data Recovery & Error Management" color="blue" T={T}/>
        <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
          <div className={`p-4 rounded-xl border ${dark?'bg-white/[0.02] border-white/5':'bg-black/[0.02] border-black/5'}`}>
            <p className={`text-2xl font-bold text-emerald-400`}>{errors.filter(e=>e.status==='resolved').length}</p>
            <p className={`text-xs ${T.textMuted}`}>Resolved Errors</p>
          </div>
          <div className={`p-4 rounded-xl border ${dark?'bg-white/[0.02] border-white/5':'bg-black/[0.02] border-black/5'}`}>
            <p className={`text-2xl font-bold text-rose-400`}>{errors.filter(e=>e.status==='unresolved').length}</p>
            <p className={`text-xs ${T.textMuted}`}>Unresolved Errors</p>
          </div>
          <div className={`p-4 rounded-xl border ${dark?'bg-white/[0.02] border-white/5':'bg-black/[0.02] border-black/5'}`}>
            <p className={`text-2xl font-bold text-blue-400`}>{db.meta?.lastSync?'✓ Synced':'⚠ Pending'}</p>
            <p className={`text-xs ${T.textMuted}`}>Sync Status</p>
          </div>
        </div>
        <div className="flex gap-2 mt-4">
          <Btn icon={GitBranch} onClick={forwardData} color="emerald" size="md">Forward Data</Btn>
          <Btn icon={RefreshCw} onClick={retrySync} color="cyan" size="md">Retry Sync</Btn>
          <Btn icon={AlertCircle} onClick={()=>setShowLog(!showLog)} variant="outline" size="md">View Error Log</Btn>
        </div>
      </Card>

      {/* Error Log */}
      {showLog&&(
        <Card dark={dark}>
          <SectionHeader icon={AlertTriangle} title="Error Log & History" color="rose" T={T}/>
          <div className="space-y-2">
            {errors.map(e=>(
              <div key={e.id} className={`p-3 rounded-lg border ${e.status==='resolved'?(dark?'bg-emerald-500/5 border-emerald-500/20':'bg-emerald-50 border-emerald-200'):(dark?'bg-rose-500/5 border-rose-500/20':'bg-rose-50 border-rose-200')}`}>
                <div className="flex items-start justify-between">
                  <div className="flex-1">
                    <p className={`text-xs font-bold ${e.status==='resolved'?'text-emerald-400':'text-rose-400'}`}>{e.table} — {e.severity.toUpperCase()}</p>
                    <p className={`text-xs mt-1 ${T.textMuted}`}>{e.error}</p>
                    <p className={`text-[10px] mt-1 ${T.textFaint}`}>{fmtDate(e.time)}</p>
                  </div>
                  {e.status==='unresolved'&&<Btn icon={CheckCircle} onClick={()=>resolveError(e.id)} variant="ghost" color="emerald" size="sm">Mark OK</Btn>}
                </div>
              </div>
            ))}
          </div>
        </Card>
      )}

      {/* Data Backup Info */}
      <Card dark={dark}>
        <SectionHeader icon={Download} title="Backup & Recovery Information" T={T}/>
        <div className={`p-3 rounded-lg ${dark?'bg-white/[0.02] border-white/5':'bg-black/[0.02] border-black/5'} border text-xs space-y-2`}>
          <p><span className={T.textFaint}>Last Backup:</span> <span className={T.text}>{fmtDate(db.meta?.lastUpdate)}</span></p>
          <p><span className={T.textFaint}>Sync Status:</span> <Badge label={db.meta?.syncStatus||'pending'} color={db.meta?.syncStatus==='synced'?'emerald':'amber'}/></p>
          <p><span className={T.textFaint}>Records:</span> <span className={T.text}>{db.revenue.length} Revenue · {db.doctors.length} Dokter · {db.inventory.length} Inventory</span></p>
        </div>
      </Card>
    </div>
  );
}

  const T=useTheme(dark);

  const toggle=(key)=>setCollapsed(p=>({...p,[key]:!p[key]}));
  const nav=(item)=>{setActive(item);setSearch('');};

  const filteredSections=useMemo(()=>{
    if(!search.trim())return SIDEBAR;
    const q=search.toLowerCase();
    return SIDEBAR.map(s=>({...s,items:s.items.filter(i=>i.toLowerCase().includes(q))})).filter(s=>s.label.toLowerCase().includes(q)||s.items.length>0);
  },[search]);

  const unreadCount=(db.notifications||[]).filter(n=>!n.read).length;

  const renderPage=()=>{
    switch(active){
      case'Dashboard':return<PageDashboard dark={dark} T={T} db={db} addToast={addToast}/>;
      case'Upload Excel':return<PageUploadExcelAdvanced dark={dark} T={T} db={db} setDB={setDB} addToast={addToast}/>;
      case'Error Recovery':return<PageErrorRecovery dark={dark} T={T} db={db} setDB={setDB} addToast={addToast}/>;
      case'Performance Monitor':return<PagePerformanceFiltered period="Monthly" dark={dark} T={T} db={db} addToast={addToast}/>;
      case'Doctor Rankings':return<PagePerformanceFiltered period="Doctor" dark={dark} T={T} db={db} addToast={addToast}/>;
      default:return<PageDashboard dark={dark} T={T} db={db} addToast={addToast}/>;
    }
  };

  return(
    <div className="flex h-screen font-sans overflow-hidden" style={{background:T.bg}}>
      {dark&&(
        <div className="fixed inset-0 pointer-events-none">
          <div className="absolute top-0 left-1/4 w-[500px] h-[500px] bg-cyan-600/8 rounded-full blur-[120px]"/>
          <div className="absolute bottom-0 right-1/4 w-[400px] h-[400px] bg-emerald-600/8 rounded-full blur-[100px]"/>
        </div>
      )}

      {/* SIDEBAR */}
      <aside className={`relative w-64 h-full ${T.sidebarBg} backdrop-blur-2xl border-r ${T.panelBorder} flex flex-col z-20`}>
        <div className={`h-14 flex items-center px-4 gap-3 border-b ${T.divider} shrink-0`}>
          <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-emerald-400 to-cyan-600 flex items-center justify-center shadow-[0_0_12px_rgba(16,185,129,0.35)] shrink-0">
            <span className="font-bold text-white text-[10px]">MBG</span>
          </div>
          <div>
            <div className={`font-bold text-sm ${T.text}`}>Monitoring <span className="text-emerald-400">Bening</span></div>
            <div className={`text-[9px] ${T.textFaint}`}>Online · v4.0</div>
          </div>
        </div>

        <div className="px-3 pt-2 pb-1 shrink-0">
          <div className="relative">
            <Search className={`absolute left-3 top-1/2 -translate-y-1/2 ${T.textFaint}`} size={12}/>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Cari menu..."
              className={`w-full rounded-lg py-1.5 pl-8 pr-3 text-xs border outline-none focus:border-emerald-500/50 ${T.inputBg} ${T.text}`}/>
          </div>
        </div>

        {/* Pinned */}
        {!search&&(
          <div className="px-3 py-1 shrink-0 space-y-0.5">
            {[{l:'Dashboard',i:LayoutDashboard},{l:'Notifikasi',i:BellRing,badge:unreadCount}].map(({l,i:Icon,badge})=>(
              <button key={l} onClick={()=>nav(l)} className={`w-full flex items-center justify-between px-3 py-2 rounded-xl transition-all ${active===l?'bg-gradient-to-r from-emerald-500/20 to-cyan-500/10 border border-emerald-500/30 text-emerald-400':`${T.hoverBg} ${T.textMuted} border border-transparent`}`}>
                <div className="flex items-center gap-2.5"><Icon size={14}/><span className="text-xs font-semibold">{l}</span></div>
                {badge>0&&<span className="text-[9px] font-bold bg-rose-500 text-white rounded-full w-4 h-4 flex items-center justify-center">{badge}</span>}
              </button>
            ))}
          </div>
        )}

        <div className="flex-1 overflow-y-auto px-3 pb-4 space-y-0.5">
          {filteredSections.map(sec=>{
            const col=collapsed[sec.key];
            return(
              <div key={sec.key}>
                <button onClick={()=>toggle(sec.key)} className={`w-full flex items-center justify-between px-2 py-1.5 mt-1.5 rounded-lg ${T.hoverBg} transition-colors`}>
                  <span className={`text-[9px] font-bold uppercase tracking-wider flex items-center gap-1.5 ${T.textFaint}`}>
                    <sec.icon size={10}/>{sec.label}
                  </span>
                  {col?<ChevronRight size={10} className={T.textFaint}/>:<ChevronUp size={10} className={T.textFaint}/>}
                </button>
                {!col&&(
                  <ul className="space-y-0.5">
                    {sec.items.map(item=>(
                      <li key={item}>
                        <button onClick={()=>nav(item)} className={`w-full flex items-center justify-between px-3 py-1.5 rounded-lg transition-all group ${active===item?(dark?'text-white bg-white/5 border-l-2 border-emerald-400':'text-slate-900 bg-black/5 border-l-2 border-emerald-500'):`${T.textMuted} ${T.hoverBg}`}`}>
                          <span className="text-xs font-medium truncate">{item}</span>
                          <ChevronRight size={10} className="opacity-0 group-hover:opacity-40 shrink-0"/>
                        </button>
                      </li>
                    ))}
                  </ul>
                )}
              </div>
            );
          })}
        </div>

        {/* Status */}
        <div className={`px-3 py-2 border-t ${T.divider} shrink-0`}>
          <div className={`flex items-center gap-2 text-[9px] ${T.textFaint}`}>
            <div className={`w-1.5 h-1.5 rounded-full ${syncing?'bg-amber-400 animate-pulse':'bg-emerald-400 animate-pulse'}`}/>
            <span>{syncing?'Syncing...':'Online'}</span>
          </div>
        </div>
      </aside>

      {/* MAIN */}
      <main className="flex-1 flex flex-col min-w-0 z-10">
        <header className={`h-12 border-b ${T.divider} px-5 flex items-center justify-between shrink-0 ${T.headerBg} backdrop-blur-md gap-3`}>
          <div className="flex items-center gap-2 min-w-0">
            <span className={`text-[10px] ${T.textFaint}`}>MBG ONLINE</span>
            <ChevronRight size={10} className={T.textFaint}/>
            <span className={`text-xs font-semibold ${T.text} truncate`}>{active}</span>
          </div>
          <div className="flex items-center gap-2 shrink-0">
            <button onClick={syncWithSheet} disabled={syncing} className={`text-sm font-medium px-2 py-1 rounded border transition-all ${syncing?(dark?'border-amber-500/30 text-amber-400':'border-amber-300 text-amber-600'):(dark?'border-emerald-500/30 text-emerald-400 hover:bg-emerald-500/10':'border-emerald-300 text-emerald-600 hover:bg-emerald-50')}`}>
              {syncing?<RefreshCw size={14} className="inline animate-spin mr-1"/>:'✓ Synced'}
            </button>
            <button onClick={()=>setDark(d=>!d)} className={`${T.textMuted} hover:text-amber-400`}>
              {dark?<Moon size={17}/>:<Sun size={17}/>}
            </button>
            <div className={`h-5 w-px ${dark?'bg-white/10':'bg-black/10'}`}/>
            <div className="flex items-center gap-1.5">
              <div className="w-6 h-6 rounded-full bg-gradient-to-br from-emerald-400 to-cyan-500 flex items-center justify-center text-[9px] font-bold text-white">M</div>
              <span className={`text-xs font-medium ${T.text} hidden sm:block`}>MBG Gresik</span>
            </div>
          </div>
        </header>

        <div className="flex-1 overflow-y-auto p-5">
          {renderPage()}
        </div>
      </main>

      <Toast toasts={toasts} remove={removeToast}/>
    </div>
  );
}

createRoot(document.getElementById('root')).render(<App/>);

// Load SheetJS library if needed
const loadXLSX=()=>new Promise(res=>{
  if(window.XLSX){res(window.XLSX);return;}
  const s=document.createElement('script');
  s.src='https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js';
  s.onload=()=>res(window.XLSX);
  s.onerror=()=>res(null);
  document.head.appendChild(s);
});
</script>
</body>
</html>
